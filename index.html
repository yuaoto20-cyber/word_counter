<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>累積型英単語カウンター</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .counter-display {
            font-size: 24px;
            font-weight: bold;
            background-color: #fff;
            border: 2px solid #333;
            padding: 15px;
            margin-bottom: 20px;
            text-align: right;
            border-radius: 5px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: vertical;
        }
        .button-group {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            color: white;
            transition: all 0.15s ease; 
        }
        #countBtn {
            background-color: #007bff;
            flex-grow: 1;
        }
        #countBtn:hover {
            background-color: #0056b3;
        }
        #resetBtn {
            background-color: #dc3545;
        }
        #resetBtn:hover {
            background-color: #a71d2a;
        }
        #countBtn.active-effect {
            transform: scale(0.95);
            background-color: #28a745;
        }
    </style>
</head>
<body>

    <h2>英単語数 累積カウンター</h2>
    
    <div class="counter-display">
        累計単語数: <span id="totalWords">0</span> words
    </div>

    <textarea id="inputText" placeholder="ここに英文をペーストしてください...（Enterキーでカウント）"></textarea>

    <div class="button-group">
        <button id="countBtn">カウントして追加</button>
        <button id="resetBtn">リセット</button>
    </div>

    <script>
        const totalWordsDisplay = document.getElementById('totalWords');
        const inputTextArea = document.getElementById('inputText');
        const countButton = document.getElementById('countBtn');
        const resetButton = document.getElementById('resetBtn');

        // ブラウザのセッションストレージから前回のデータを取得（なければ0）
        let cumulativeCount = parseInt(sessionStorage.getItem('cumulativeWordCount')) || 0;
        
        // ページ読み込み時に保存されていた数値を表示
        totalWordsDisplay.textContent = cumulativeCount;

        function countWords(text) {
            const trimmedText = text.trim();
            if (trimmedText === '') return 0;
            return trimmedText.split(/\s+/).length;
        }

        countButton.addEventListener('click', () => {
            const currentText = inputTextArea.value;
            const newWordsCount = countWords(currentText);
            
            if (newWordsCount === 0) return;

            // 累計に加算し、表示を更新
            cumulativeCount += newWordsCount;
            totalWordsDisplay.textContent = cumulativeCount;
            
            // セッションストレージに最新の数値を保存
            sessionStorage.setItem('cumulativeWordCount', cumulativeCount);
            
            inputTextArea.value = '';

            // 演出の処理
            countButton.classList.add('active-effect');
            countButton.textContent = '+ ' + newWordsCount + ' 追加しました';

            setTimeout(() => {
                countButton.classList.remove('active-effect');
                countButton.textContent = 'カウントして追加';
            }, 300);
        });

        resetButton.addEventListener('click', () => {
            if (confirm('累計単語数をリセットしてもよろしいですか？')) {
                cumulativeCount = 0;
                totalWordsDisplay.textContent = cumulativeCount;
                
                // セッションストレージのデータも削除
                sessionStorage.removeItem('cumulativeWordCount');
                
                inputTextArea.value = '';
            }
        });

        // エンターキーでのカウント実行処理
        inputTextArea.addEventListener('keydown', (e) => {
            // Enterキーが押され、かつShiftキーが押されていない場合
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); // テキストエリア内での改行を防ぐ
                countButton.click(); // カウントボタンのクリック処理を強制実行
            }
        });
    </script>
</body>
</html>
